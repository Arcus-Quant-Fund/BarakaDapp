[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@chainlink/=lib/chainlink-brownie-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
arbitrum_sepolia = "${ALCHEMY_ARBITRUM_SEPOLIA_RPC}"
arbitrum_mainnet = "${ALCHEMY_ARBITRUM_MAINNET_RPC}"
localhost        = "http://127.0.0.1:8545"

# Etherscan V2 — single key, chain ID selects the network
# V2 URL: https://api.etherscan.io/v2/api?chainid=<id>
[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=421614" }
arbitrum_mainnet = { key = "${ARBISCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=42161" }
