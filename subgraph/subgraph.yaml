specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  # ── PositionManager (v4 — payPnl via IF, redeployed 2026-03-05) ──────────
  - kind: ethereum
    name: PositionManager
    network: arbitrum-sepolia
    source:
      address: "0x5a8b09cc1EE6462fCc34311A08770336C2b05d31"
      abi: PositionManager
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Position
        - Trade
        - FundingSettlement
        - MarketStats
        - Protocol
      abis:
        - name: PositionManager
          file: ./abis/PositionManager.json
      eventHandlers:
        - event: PositionOpened(indexed bytes32,indexed address,indexed address,address,uint256,uint256,uint256,bool)
          handler: handlePositionOpened
        - event: PositionClosed(indexed bytes32,indexed address,int256,uint256)
          handler: handlePositionClosed
        - event: FundingSettled(indexed bytes32,int256,uint256)
          handler: handleFundingSettled
      file: ./src/position-manager.ts

  # ── FundingEngine (v2 — interval cap 720, redeployed 2026-03-05) ─
  - kind: ethereum
    name: FundingEngine
    network: arbitrum-sepolia
    source:
      address: "0x9aFD9fba678CBDCA695C7b59CF73F2477E18AfF4"
      abi: FundingEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FundingRateSnapshot
        - MarketStats
      abis:
        - name: FundingEngine
          file: ./abis/FundingEngine.json
      eventHandlers:
        - event: FundingRateUpdated(indexed address,int256,uint256,uint256,uint256)
          handler: handleFundingRateUpdated
      file: ./src/funding-engine.ts

  # ── CollateralVault (v2 — chargeFromFree, deployed 2026-02-27) ──────────
  - kind: ethereum
    name: CollateralVault
    network: arbitrum-sepolia
    source:
      address: "0x0e9e32e4e061Db57eE5d3309A986423A5ad3227E"
      abi: CollateralVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DepositEvent
        - WithdrawEvent
        - Protocol
      abis:
        - name: CollateralVault
          file: ./abis/CollateralVault.json
      eventHandlers:
        - event: Deposited(indexed address,indexed address,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/collateral-vault.ts

  # ── LiquidationEngine (v3 — oracle equity check, redeployed 2026-03-05) ──
  - kind: ethereum
    name: LiquidationEngine
    network: arbitrum-sepolia
    source:
      address: "0x8E709e3DBc3A074B27C77c1C0247d3F1DDDc65bA"
      abi: LiquidationEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - LiquidationEvent
        - Position
        - MarketStats
        - Protocol
      abis:
        - name: LiquidationEngine
          file: ./abis/LiquidationEngine.json
      eventHandlers:
        - event: Liquidated(indexed bytes32,indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleLiquidated
      file: ./src/liquidation-engine.ts

  # ── TakafulPool (L3 — mutual Islamic insurance, redeployed 2026-03-05) ────
  - kind: ethereum
    name: TakafulPool
    network: arbitrum-sepolia
    source:
      address: "0x63865E7d3d8D9524df1051d291991ce51b391c91"
      abi: TakafulPool
      startBlock: 245800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ContributionEvent
        - ClaimEvent
      abis:
        - name: TakafulPool
          file: ./abis/TakafulPool.json
      eventHandlers:
        - event: ContributionMade(indexed bytes32,indexed address,uint256,uint256,uint256)
          handler: handleContributionMade
        - event: ClaimPaid(indexed bytes32,indexed address,uint256)
          handler: handleClaimPaid
      file: ./src/takaful-pool.ts

  # ── PerpetualSukuk (L2 — Islamic capital markets, redeployed 2026-03-05) ──
  - kind: ethereum
    name: PerpetualSukuk
    network: arbitrum-sepolia
    source:
      address: "0xB2c5EEdF519aca6F77E494154BCC9906fF7999B3"
      abi: PerpetualSukuk
      startBlock: 245800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SukukSubscription
        - SukukProfit
      abis:
        - name: PerpetualSukuk
          file: ./abis/PerpetualSukuk.json
      eventHandlers:
        - event: Subscribed(indexed uint256,indexed address,uint256)
          handler: handleSubscribed
        - event: ProfitClaimed(indexed uint256,indexed address,uint256)
          handler: handleProfitClaimed
        - event: Redeemed(indexed uint256,indexed address,uint256,uint256)
          handler: handleRedeemed
      file: ./src/perpetual-sukuk.ts

  # ── iCDS (L4 — Islamic Credit Default Swap v2, redeployed 2026-03-05) ────
  - kind: ethereum
    name: iCDS
    network: arbitrum-sepolia
    source:
      address: "0x7A027c8413e9cfCbE580d95C716d98D2b159b15F"
      abi: iCDS
      startBlock: 245800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtectionEvent
      abis:
        - name: iCDS
          file: ./abis/iCDS.json
      eventHandlers:
        - event: ProtectionOpened(indexed uint256,indexed address,address,address,uint256,uint256)
          handler: handleProtectionOpened
        - event: ProtectionAccepted(indexed uint256,indexed address)
          handler: handleProtectionAccepted
        - event: Settled(indexed uint256,indexed address,uint256,uint256)
          handler: handleSettled
      file: ./src/icds.ts
