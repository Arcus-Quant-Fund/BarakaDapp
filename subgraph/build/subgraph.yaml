specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: PositionManager
    network: arbitrum-sepolia
    source:
      address: "0x035E38fd8b34486530A4Cd60cE9D840e1a0A124a"
      abi: PositionManager
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Position
        - Trade
        - FundingSettlement
        - MarketStats
        - Protocol
      abis:
        - name: PositionManager
          file: PositionManager/PositionManager.json
      eventHandlers:
        - event: PositionOpened(indexed bytes32,indexed address,indexed
            address,address,uint256,uint256,uint256,bool)
          handler: handlePositionOpened
        - event: PositionClosed(indexed bytes32,indexed address,int256,uint256)
          handler: handlePositionClosed
        - event: FundingSettled(indexed bytes32,int256,uint256)
          handler: handleFundingSettled
      file: PositionManager/PositionManager.wasm
  - kind: ethereum
    name: FundingEngine
    network: arbitrum-sepolia
    source:
      address: "0x459BE882BC8736e92AA4589D1b143e775b114b38"
      abi: FundingEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FundingRateSnapshot
        - MarketStats
      abis:
        - name: FundingEngine
          file: FundingEngine/FundingEngine.json
      eventHandlers:
        - event: FundingRateUpdated(indexed address,int256,uint256,uint256,uint256)
          handler: handleFundingRateUpdated
      file: FundingEngine/FundingEngine.wasm
  - kind: ethereum
    name: CollateralVault
    network: arbitrum-sepolia
    source:
      address: "0x0e9e32e4e061Db57eE5d3309A986423A5ad3227E"
      abi: CollateralVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - DepositEvent
        - WithdrawEvent
        - Protocol
      abis:
        - name: CollateralVault
          file: CollateralVault/CollateralVault.json
      eventHandlers:
        - event: Deposited(indexed address,indexed address,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,indexed address,uint256)
          handler: handleWithdrawn
      file: CollateralVault/CollateralVault.wasm
  - kind: ethereum
    name: LiquidationEngine
    network: arbitrum-sepolia
    source:
      address: "0x17D9399C7e17690bE23544E379907eC1AB6b7E07"
      abi: LiquidationEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - LiquidationEvent
        - Position
        - MarketStats
        - Protocol
      abis:
        - name: LiquidationEngine
          file: LiquidationEngine/LiquidationEngine.json
      eventHandlers:
        - event: Liquidated(indexed bytes32,indexed address,indexed
            address,uint256,uint256,uint256,uint256)
          handler: handleLiquidated
      file: LiquidationEngine/LiquidationEngine.wasm
  - kind: ethereum
    name: TakafulPool
    network: arbitrum-sepolia
    source:
      address: "0xD53d34cC599CfadB5D1f77516E7Eb326a08bb0E4"
      abi: TakafulPool
      startBlock: 245800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ContributionEvent
        - ClaimEvent
      abis:
        - name: TakafulPool
          file: TakafulPool/TakafulPool.json
      eventHandlers:
        - event: ContributionMade(indexed bytes32,indexed address,uint256,uint256,uint256)
          handler: handleContributionMade
        - event: ClaimPaid(indexed bytes32,indexed address,uint256)
          handler: handleClaimPaid
      file: TakafulPool/TakafulPool.wasm
  - kind: ethereum
    name: PerpetualSukuk
    network: arbitrum-sepolia
    source:
      address: "0xd209f7B587c8301D5E4eC1691264deC1a560e48D"
      abi: PerpetualSukuk
      startBlock: 245800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SukukSubscription
        - SukukProfit
      abis:
        - name: PerpetualSukuk
          file: PerpetualSukuk/PerpetualSukuk.json
      eventHandlers:
        - event: Subscribed(indexed uint256,indexed address,uint256)
          handler: handleSubscribed
        - event: ProfitClaimed(indexed uint256,indexed address,uint256)
          handler: handleProfitClaimed
        - event: Redeemed(indexed uint256,indexed address,uint256,uint256)
          handler: handleRedeemed
      file: PerpetualSukuk/PerpetualSukuk.wasm
  - kind: ethereum
    name: iCDS
    network: arbitrum-sepolia
    source:
      address: "0xc4E8907619C8C02AF90D146B710306aB042c16c5"
      abi: iCDS
      startBlock: 245800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProtectionEvent
      abis:
        - name: iCDS
          file: iCDS/iCDS.json
      eventHandlers:
        - event: ProtectionOpened(indexed uint256,indexed address,address,address,uint256,uint256)
          handler: handleProtectionOpened
        - event: ProtectionAccepted(indexed uint256,indexed address)
          handler: handleProtectionAccepted
        - event: Settled(indexed uint256,indexed address,uint256,uint256)
          handler: handleSettled
      file: iCDS/iCDS.wasm
