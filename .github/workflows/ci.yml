name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Smart Contract Tests (Foundry)
  # ─────────────────────────────────────────────────────────────────────────────
  contracts:
    name: Forge Tests (177/177)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache Foundry build
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: foundry-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**/*.sol') }}
          restore-keys: foundry-

      - name: Forge build
        run: forge build

      - name: Forge test — unit + integration
        run: forge test -vvv
        env:
          # Provide placeholder RPC so fork tests don't fail in CI
          # (all tests use local mock — no real RPC calls needed)
          ALCHEMY_ARBITRUM_SEPOLIA_RPC: ${{ secrets.ALCHEMY_ARBITRUM_SEPOLIA_RPC }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Static Analysis (Slither)
  # ─────────────────────────────────────────────────────────────────────────────
  slither:
    name: Slither — HIGH 0 / MEDIUM 0
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry (needed for slither ABI resolution)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: |
          export PATH="$HOME/.foundry/bin:$PATH"
          slither . \
            --exclude-dependencies \
            --no-fail-pedantic \
            --fail-high \
            --fail-medium
        # CI will fail if any HIGH or MEDIUM is introduced (LOW/INFO are acceptable)

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Build (Next.js)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Build (8/8 routes)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js build
        run: npm run build
        env:
          # No subgraph in CI — falls back to getLogs mode (no network calls in build)
          NEXT_PUBLIC_SUBGRAPH_URL: ''
          NEXT_PUBLIC_ALCHEMY_RPC: 'https://arb-sepolia.g.alchemy.com/v2/dummy'
          NEXT_PUBLIC_CHAIN_ID: '421614'

  # ─────────────────────────────────────────────────────────────────────────────
  # Subgraph Build (graph-cli)
  # ─────────────────────────────────────────────────────────────────────────────
  subgraph:
    name: Subgraph Build (WASM compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: subgraph

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: subgraph/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: graph codegen
        run: npm run codegen

      - name: graph build
        run: npm run build
